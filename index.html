// ===== TRAINING LOAD DASHBOARD =====
function n(v){return Number(v)||0}
function daysAgoDate(days){
  const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-days);return d;
}
function logDateValue(l){const d=new Date(l.date);d.setHours(0,0,0,0);return d}
function logMinutes(l){
  if(n(l.duration))return Math.round(n(l.duration));
  const total=(l.exercises||[]).reduce((sum,e)=>sum+n(e.duration),0);
  return Math.round(total);
}
function logLoad(l){
  return Math.round(logMinutes(l)*n(l.rpe));
}
function logsBetween(start,end){
  const s=fmtDate(start),e=fmtDate(end);
  return logs.filter(l=>l.date>=s&&l.date<=e);
}
function sumLoad(items){return items.reduce((sum,l)=>sum+logLoad(l),0)}
function dailyLoadRows(){
  return Array.from({length:7},(_,i)=>{
    const d=daysAgoDate(6-i),ds=fmtDate(d);
    const dayLogs=logs.filter(l=>l.date===ds);
    const load=sumLoad(dayLogs);
    return {date:d,ds,label:DAYS_SHORT[(d.getDay()+6)%7],load,count:dayLogs.length};
  });
}
function loadStatus(monotony,weekly){
  if(!weekly)return {label:'No load yet',note:'Log duration and RPE to build the dashboard.',cls:''};
  if(monotony>2)return {label:'High monotony',note:'Daily load is very similar across the week. Mix harder and easier days.',cls:'high'};
  if(monotony>1.5)return {label:'Watch monotony',note:'The week is trending repetitive. A clear easy day can lower strain.',cls:'medium'};
  return {label:'Balanced spread',note:'Load is spread with enough day-to-day variation.',cls:''};
}
function renderLoadDashboard(){
  const today=daysAgoDate(0),weekStart=daysAgoDate(6);
  const weekLogs=logsBetween(weekStart,today);
  const dailyLoad=sumLoad(logs.filter(l=>l.date===fmtDate(today)));
  const weeklyLoad=sumLoad(weekLogs);
  const days=dailyLoadRows(),maxDay=Math.max(1,...days.map(d=>d.load));
  const avg=weeklyLoad/7;
  const variance=days.reduce((sum,d)=>sum+Math.pow(d.load-avg,2),0)/7;
  const monotony=Math.sqrt(variance)?avg/Math.sqrt(variance):weeklyLoad?7:0;
  const strain=Math.round(weeklyLoad*monotony);
  const status=loadStatus(monotony,weeklyLoad);
  const typeTotals=TYPES.map(type=>({type,total:sumLoad(weekLogs.filter(l=>l.type===type))})).filter(x=>x.total>0);
  const maxType=Math.max(1,...typeTotals.map(x=>x.total));
  const topSessions=[...weekLogs].sort((a,b)=>logLoad(b)-logLoad(a)).slice(0,4);
  let html=`<div class="section-hdr"><div class="section-title">Training Load</div></div>
  <div class="load-card">
    <div class="load-hero">
      <div class="load-score"><strong>${dailyLoad}</strong><span>Daily load</span></div>
      <div class="load-trend"><strong>${weeklyLoad}</strong><span>Weekly load</span></div>
      <div class="load-trend"><strong>${Math.round(avg)}</strong><span>7-day average</span></div>
    </div>
    <div class="load-note">Load = duration x RPE. ${status.note}</div>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="stat-num">${dailyLoad}</div><div class="stat-label">Daily</div></div>
    <div class="stat"><div class="stat-num">${monotony.toFixed(1)}</div><div class="stat-label">Monotony</div></div>
    <div class="stat"><div class="stat-num">${strain}</div><div class="stat-label">Strain</div></div>
  </div>
  <div class="load-card">
    <div class="warmup-title">Daily load</div>
    <div class="load-bars">${days.map(d=>{
      const pct=Math.max(3,Math.round((d.load/maxDay)*100));
      const cls=d.load>avg*1.45?'high':d.load>avg*1.1?'medium':'';
      return `<div class="load-day"><div class="load-bar-wrap"><div class="load-bar ${cls}" style="height:${pct}%"></div></div><div class="load-day-label">${d.label}</div><div class="load-day-num">${d.load}</div></div>`;
    }).join('')}</div>
  </div>
  <div class="load-card">
    <div class="warmup-title">Load split</div>
    ${typeTotals.length?`<div class="load-split">${typeTotals.map(x=>`
      <div class="load-zone">
        <div class="load-zone-head"><span>${x.type}</span><span>${x.total}</span></div>
        <div class="load-zone-track"><div class="load-zone-fill" style="width:${Math.round((x.total/maxType)*100)}%"></div></div>
      </div>`).join('')}</div>`:`<div class="empty" style="padding:24px 12px"><i class="ti ti-chart-bar"></i><p>No workouts in the last 7 days.</p></div>`}
  </div>
  <div class="load-card">
    <div class="warmup-title">Load signals</div>
    <div class="load-list">
      <div class="load-row"><span class="load-dot" style="background:var(--accent)"></span><span>${status.label}</span><strong>${monotony.toFixed(1)}</strong></div>
      <div class="load-row"><span class="load-dot" style="background:var(--blue)"></span><span>Sessions this week</span><strong>${weekLogs.length}</strong></div>
      <div class="load-row"><span class="load-dot" style="background:var(--amber)"></span><span>Formula</span><strong>min x RPE</strong></div>
    </div>
  </div>`;
  if(topSessions.length){
    html+=`<div class="load-card"><div class="warmup-title">Top sessions</div><div class="load-list">${topSessions.map(l=>`
      <div class="load-row"><span class="load-dot type-${l.type}"></span><span>${esc(l.name)}<br><small>${fmtDisplay(new Date(l.date))} &middot; ${l.type} &middot; ${logMinutes(l)} min</small></span><strong>${logLoad(l)}</strong></div>
    `).join('')}</div></div>`;
  }
  document.getElementById('scroll-area').innerHTML=html;
}


// ===== TRENDS TAB =====
let trendDays=14;
function setTrendDays(days){trendDays=days;renderTrends()}
function trendDates(days){
  return Array.from({length:days},(_,i)=>{const d=daysAgoDate(days-1-i);return {date:d,ds:fmtDate(d),label:fmtDisplay(d)}});
}
function healthMap(){
  const m={};healthLogs().forEach(h=>{m[h.date]=healthForDate(h.date)});return m;
}
function maxPain(h){
  if(!h||!h.body)return null;
  return Math.max(...Object.values(h.body).map(n),0);
}
function trendSeries(days,key){
  const hm=healthMap();
  return trendDates(days).map(d=>{
    const h=hm[d.ds];
    let value=null;
    if(key==='load')value=sumLoad(logs.filter(l=>l.date===d.ds));
    if(key==='readiness')value=h?healthReadiness(h):null;
    if(key==='pain')value=h?maxPain(h):null;
    if(key==='sleep')value=h?n(h.recovery.sleepHours):null;
    if(key==='rhr')value=h?n(h.recovery.restingHr):null;
    if(key==='bodyweight')value=h?n(h.recovery.bodyweight):null;
    if(value===0&&key!=='load'&&key!=='pain')value=null;
    return Object.assign({},d,{value});
  });
}
function trendValueText(v,unit){
  if(v==null)return '-';
  const display=Number.isInteger(v)?v:v.toFixed(unit==='kg'?1:1);
  return `${display}${unit?` ${unit}`:''}`;
}
function trendSvg(series,type='line'){
  const valid=series.filter(p=>p.value!=null);
  if(!valid.length)return `<div class="trend-empty">No data yet</div>`;
  const w=320,h=116,pad=14;
  const max=Math.max(...valid.map(p=>p.value),1);
  const min=type==='line'?Math.min(...valid.map(p=>p.value)):0;
  const span=Math.max(1,max-min);
  const x=(i)=>pad+(series.length===1?0:(i/(series.length-1))*(w-pad*2));
  const y=(v)=>h-pad-((v-min)/span)*(h-pad*2);
  if(type==='bar'){
    const bw=Math.max(4,(w-pad*2)/series.length-3);
    return `<svg class="trend-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><line class="trend-axis" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"></line>${series.map((p,i)=>{
      const val=p.value||0,barH=((val)/Math.max(max,1))*(h-pad*2);
      const cls=val>7?'high':val>4?'warn':'';
      return `<rect class="trend-bar ${cls}" x="${x(i)-bw/2}" y="${h-pad-barH}" width="${bw}" height="${barH}" rx="2"></rect>`;
    }).join('')}</svg>`;
  }
  const points=series.map((p,i)=>p.value==null?null:`${x(i)},${y(p.value)}`).filter(Boolean).join(' ');
  const area=`${pad},${h-pad} ${points} ${w-pad},${h-pad}`;
  return `<svg class="trend-chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><line class="trend-axis" x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}"></line><polygon class="trend-area" points="${area}"></polygon><polyline class="trend-line" points="${points}"></polyline></svg>`;
}
function trendCard(title,key,unit,type='line'){
  const series=trendSeries(trendDays,key);
  const latest=[...series].reverse().find(x=>x.value!=null);
  const valid=series.filter(x=>x.value!=null);
  const avg=valid.length?valid.reduce((s,x)=>s+x.value,0)/valid.length:null;
  return `<div class="trend-card">
    <div class="trend-head"><div class="trend-title">${title}<span class="trend-sub">${trendDays}-day trend</span></div><div class="trend-value">${trendValueText(latest?.value,unit)}<span class="trend-sub">avg ${trendValueText(avg,unit)}</span></div></div>
    ${trendSvg(series,type)}
  </div>`;
}
function renderTrends(){
  let html=`<div class="section-hdr"><div class="section-title">Trend Charts</div></div>
  <div class="trend-controls">${[7,14,30].map(d=>`<button class="trend-btn ${trendDays===d?'active':''}" onclick="setTrendDays(${d})">${d} days</button>`).join('')}</div>
  ${trendCard('Training load','load','load','bar')}
  ${trendCard('Readiness','readiness','%')}
  ${trendCard('Pain areas','pain','/10','bar')}
  ${trendCard('Sleep','sleep','h')}
  ${trendCard('Resting HR','rhr','bpm')}
  ${trendCard('Bodyweight','bodyweight','kg')}`;
  document.getElementById('scroll-area').innerHTML=html;
}

function healthForDate(ds){
  const found=healthLogs().find(x=>x.date===ds);
  const base=healthDefault(ds);
  if(!found)return base;
  return Object.assign(base,found,{checkin:Object.assign(base.checkin,found.checkin||{}),body:Object.assign(base.body,found.body||{}),mobility:Object.assign(base.mobility,found.mobility||{}),recovery:Object.assign(base.recovery,found.recovery||{})});
}
function healthReadiness(h){
  const c=h.checkin||{};
  return Math.round(((n(c.energy)+(10-n(c.fatigue))+n(c.motivation)+(10-n(c.stress)))/40)*100);
}
function healthStatus(h){
  const maxPain=Math.max(...Object.values(h.body||{}).map(n),0);
  const c=h.checkin||{};
  if(maxPain>=7||n(c.fatigue)>=8||n(c.stress)>=8)return {label:'🔴 Action Required',cls:'status-action'};
  if(maxPain>=4||n(c.fatigue)>=5||n(c.stress)>=6||n(c.energy)<=4||n(c.motivation)<=4)return {label:'🟡 Monitor',cls:'status-monitor'};
  return {label:'🟢 Good',cls:''};
}
function healthAlerts(){
  const list=healthLogs().slice().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const alerts=[];
  const rightHipStreak=list.slice(0,4);
  if(rightHipStreak.length===4&&rightHipStreak.every(x=>n((x.body||{})['Right Hip'])>5)){
    alerts.push({level:'action',text:'Warning: Right hip score has been above 5 for 4 consecutive days.'});
  }
  if(list.length>=2){
    const today=list[0],prev=list[1];
    const readinessFalling=healthReadiness(today)<healthReadiness(prev)-8;
    const dl=dailyLoadRows();
    const loadIncreasing=dl.length>=2&&dl[6].load>dl[5].load&&dl[6].load>0;
    if(readinessFalling&&loadIncreasing)alerts.push({level:'monitor',text:'Warning: readiness is falling while training load is increasing.'});
  }
  return alerts;
}
function saveHealthCheck(){
  const ds=fmtDate(new Date());
  const current=healthForDate(ds);
  const body={};BODY_AREAS.forEach(a=>body[a]=n(document.getElementById('body-'+areaId(a)).value));
  const entry={
    id:current.id||Date.now(),date:ds,
    checkin:{
      energy:n(document.getElementById('hc-energy').value),
      fatigue:n(document.getElementById('hc-fatigue').value),
      motivation:n(document.getElementById('hc-motivation').value),
      stress:n(document.getElementById('hc-stress').value)
    },
    body,
    mobility:{
      leftAnkle:document.getElementById('mob-left-ankle').value,
      rightAnkle:document.getElementById('mob-right-ankle').value,
      deepSquat:document.getElementById('mob-squat').value,
      hipFlexorLeft:document.getElementById('mob-hip-left').value,
      hipFlexorRight:document.getElementById('mob-hip-right').value
    },
    recovery:{
      sleepHours:document.getElementById('rec-sleep-hours').value,
      sleepQuality:n(document.getElementById('rec-sleep-quality').value),
      bodyweight:document.getElementById('rec-bodyweight').value,
      restingHr:document.getElementById('rec-rhr').value,
      hrv:document.getElementById('rec-hrv').value,
      physioNotes:document.getElementById('rec-physio').value
    },
    notes:document.getElementById('health-notes').value
  };
  const list=healthLogs().filter(x=>x.date!==ds);
  list.unshift(entry);
  saveHealthLogs(list);
  showToast('Health check saved ✓');
  renderPerform();
}
function areaId(name){return name.toLowerCase().replace(/[^a-z0-9]+/g,'-')}
function healthSlider(label,id,val){
  return `<div class="health-field"><label><span>${label}</span><span id="${id}-v">${val}/10</span></label><input type="range" min="0" max="10" value="${val}" id="${id}" oninput="document.getElementById('${id}-v').textContent=this.value+'/10'"></div>`;
}
function bodyAreaSlider(name,val){return healthSlider(name,'body-'+areaId(name),val)}
function mobilitySelect(id,val){
  return `<select id="${id}">${['Comfortable','Restricted','Painful'].map(x=>`<option${x===val?' selected':''}>${x}</option>`).join('')}</select>`;
}
function recentHealthLogs(){
  const list=healthLogs().slice(0,5);
  if(!list.length)return `<div class="mini-note">No health checks logged yet.</div>`;
  return list.map(h=>`<div class="health-log"><div class="health-log-head">${fmtFull(h.date)} · ${healthStatus(healthForDate(h.date)).label}</div><div class="health-log-body">${h.notes?esc(h.notes):'No notes'}${(h.recovery||{}).physioNotes?`<br><strong>Physio:</strong> ${esc(h.recovery.physioNotes)}`:''}</div></div>`).join('');
}
function mentalForDate(ds){return mentalLogs.find(x=>x.date===ds)||null}
function mentalDefault(){return {date:fmtDate(new Date()),wins:'',improve:'',visualised:false,cue:false,pressure:false,review:false,confidence:3,focus:3,pressureControl:3,notes:''}}
function mentalToday(){return Object.assign(mentalDefault(),mentalForDate(fmtDate(new Date()))||{})}
function mentalCompletedCount(){return mentalLogs.length}
function saveMentalTraining(){
  const ds=fmtDate(new Date());
  const entry={
    id:mentalForDate(ds)?.id||Date.now(),
    date:ds,
    wins:document.getElementById('mt-wins').value,
    improve:document.getElementById('mt-improve').value,
    visualised:document.getElementById('mt-visualised').checked,
    cue:document.getElementById('mt-cue').checked,
    pressure:document.getElementById('mt-pressure').checked,
    review:document.getElementById('mt-review').checked,
    confidence:+document.getElementById('mt-confidence').value,
    focus:+document.getElementById('mt-focus').value,
    pressureControl:+document.getElementById('mt-pressureControl').value,
    notes:document.getElementById('mt-notes').value
  };
  mentalLogs=mentalLogs.filter(x=>x.date!==ds);
  mentalLogs.unshift(entry);
  saveMentalLogs(mentalLogs);
  showToast('Mental training logged ✓');
  renderPerform();
}

  <div class="health-card">

    ${alerts.map(a=>`<div class="health-alert ${a.level==='action'?'action':''}">${a.text}</div>`).join('')}
    <div class="warmup-title" style="margin-top:10px">Daily check-in</div>
    <div class="health-grid">

      <div class="field"><label>Right ankle knee-to-wall (cm)</label><input type="number" id="mob-right-ankle" min="0" step="0.5" value="${esc(h.mobility.rightAnkle)}" placeholder="cm"></div>
    </div>
    <div class="mobility-row">

    </div>

  <div class="health-card">

      <div class="field"><label>Sleep hours</label><input type="number" id="rec-sleep-hours" min="0" step="0.25" value="${esc(h.recovery.sleepHours)}" placeholder="e.g. 8"></div>
      <div class="health-field"><label><span>Sleep quality</span><span id="rec-sleep-quality-v">${h.recovery.sleepQuality}/10</span></label><input type="range" min="0" max="10" value="${h.recovery.sleepQuality}" id="rec-sleep-quality" oninput="document.getElementById('rec-sleep-quality-v').textContent=this.value+'/10'"></div>
      <div class="field"><label>Morning bodyweight</label><input type="number" id="rec-bodyweight" min="0" step="0.1" value="${esc(h.recovery.bodyweight)}" placeholder="kg"></div>
      <div class="field"><label>Resting HR</label><input type="number" id="rec-rhr" min="0" step="1" value="${esc(h.recovery.restingHr)}" placeholder="bpm"></div>
      <div class="field"><label>HRV optional</label><input type="number" id="rec-hrv" min="0" step="1" value="${esc(h.recovery.hrv)}" placeholder="ms"></div>
      <div class="field"><label>Physio notes</label><input type="text" id="rec-physio" value="${esc(h.recovery.physioNotes)}" placeholder="Treatment, advice, changes"></div>
    </div>
    <div class="field"><label>Running log</label><textarea id="health-notes" placeholder="Right hip tight after sprint session. Mobility: hip flexor stretch, couch stretch. Improved after 10 mins.">${esc(h.notes)}</textarea></div>
    <button class="btn-primary" onclick="saveHealthCheck()"><i class="ti ti-device-floppy"></i>Save health check</button>
  </div>

function renderPerform(){
  const r=readinessToday(); const score=readinessScore(r); const m=mentalToday(); const logged=!!mentalForDate(fmtDate(new Date()));
  let html=`<div class="section-hdr"><div class="section-title">Performance</div></div>
  <div class="readiness-card"><div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Today's readiness</div><div class="readiness-score">${score}%</div><div class="mini-note">Use this before AM training. If below 60%, keep intensity but cut volume by 20–30%.</div>
  ${sliderHtml('Sleep','sleep',r.sleep)}${sliderHtml('Soreness','soreness',r.soreness)}${sliderHtml('Mood','mood',r.mood)}${sliderHtml('Motivation','motivation',r.motivation)}${sliderHtml('Stress','stress',r.stress)}
  <div class="field"><label>Notes</label><textarea id="rd-notes" placeholder="Body, travel, confidence, anything important">${esc(r.notes||'')}</textarea></div><button class="btn-primary" onclick="saveReadiness()"><i class="ti ti-device-floppy"></i>Save readiness</button></div>
  <div class="mental-card"><div class="warmup-title">Daily mental training log ${logged?'<span class="done-badge">Logged</span>':''}</div>
    <div class="field"><label>3 things I did well today</label><textarea id="mt-wins" placeholder="Evidence of progress, execution, discipline">${esc(m.wins)}</textarea></div>
    <div class="field"><label>1 thing to improve tomorrow</label><textarea id="mt-improve" placeholder="Keep this to one controllable item">${esc(m.improve)}</textarea></div>
    ${mentalLogCheck('mt-visualised','Visualised start, row, buoy turn, exit, finish',m.visualised)}
    ${mentalLogCheck('mt-cue','Repeated cue: aggressive start, relaxed middle, violent finish',m.cue)}
    ${mentalLogCheck('mt-pressure','Pressure simulation completed',m.pressure)}
    ${mentalLogCheck('mt-review','Weekly review completed',m.review)}
    <div class="mental-grid">
      ${mentalMetric('Confidence','confidence',m.confidence)}
      ${mentalMetric('Focus','focus',m.focus)}
      ${mentalMetric('Pressure control','pressureControl',m.pressureControl)}
    </div>
    <div class="field"><label>Mental notes</label><textarea id="mt-notes" placeholder="What did I notice under pressure? What do I want to rehearse tomorrow?">${esc(m.notes)}</textarea></div>

    <div class="mini-note">Tuesday/Saturday: pressure simulation. Sunday: weekly review. Daily: evidence-based confidence.</div>
    ${recentMentalLogs()}
  </div>
  <div class="warmup-card"><div class="warmup-title">Warm-up library</div>${warmupBlock('Erg')}${warmupBlock('Run')}${warmupBlock('Mobility')}</div>`;
  document.getElementById('scroll-area').innerHTML=html;
}
function sliderHtml(label,key,val){return `<div class="slider-row"><div class="slider-head"><span>${label}</span><span id="rd-${key}-v">${val}/5</span></div><input type="range" min="1" max="5" value="${val}" id="rd-${key}" oninput="document.getElementById('rd-${key}-v').textContent=this.value+'/5'"></div>`}
function mentalMetric(label,key,val){return `<div class="mental-pill"><strong id="mt-${key}-v">${val}</strong><span>${label}</span><input type="range" min="1" max="5" value="${val}" id="mt-${key}" oninput="document.getElementById('mt-${key}-v').textContent=this.value"></div>`}
function mentalLogCheck(id,label,checked){return `<div class="check-row"><input type="checkbox" id="${id}" ${checked?'checked':''}><label>${label}</label></div>`}
function recentMentalLogs(){
  if(!mentalLogs.length)return `<div class="mini-note">No mental training logged yet.</div>`;
  return `<div style="margin-top:14px"><div class="warmup-title">Recent mental logs</div>${mentalLogs.slice(0,3).map(m=>mentalLogHtml(m)).join('')}</div>`
}
function mentalLogHtml(m){
  const checks=[m.visualised?'visualised':null,m.cue?'cue':null,m.pressure?'pressure':null,m.review?'review':null].filter(Boolean).join(' · ')||'checklist not completed';
  return `<div class="mental-log-card"><div class="mental-log-title">${fmtFull(m.date)}</div><div class="mental-log-meta">Confidence ${m.confidence}/5 · Focus ${m.focus}/5 · Pressure ${m.pressureControl}/5<br>${checks}</div>${m.wins?`<div class="log-note"><strong>Wins:</strong> ${esc(m.wins)}</div>`:''}${m.improve?`<div class="log-note"><strong>Improve:</strong> ${esc(m.improve)}</div>`:''}</div>`
}
function deleteMentalLog(id){
  mentalLogs=mentalLogs.filter(m=>m.id!==id);saveMentalLogs(mentalLogs);showToast('Mental log deleted');
  if(activeTab==='history')renderHistory(); else renderPerform();
}
function warmupBlock(mode){return `<div style="margin-bottom:12px"><div class="session-detail-label ${mode==='Erg'?'am-label':mode==='Run'?'pm-label':''}">${mode}</div><ul class="warmup-list">${WARMUPS[mode].map(x=>`<li>${x}</li>`).join('')}</ul></div>`}
function openWarmup(mode){
  const html=`<div class="warmup-card"><div class="warmup-title">${mode} warm-up</div><ul class="warmup-list">${WARMUPS[mode].map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  document.getElementById('modal-day-title').textContent=mode+' warm-up';
  document.getElementById('modal-day-content').innerHTML=html;
  document.getElementById('day-modal').classList.add('open');
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  showToast('Install available from browser menu');

function registerPwa(){
  const canRegister='serviceWorker' in navigator && location.protocol!=='file:';
  if(!canRegister)return;
  navigator.serviceWorker.register('training-tracker-sw.js').catch(()=>{});
}

// ===== INIT =====
getProgramStart();
ensureDefaultRaceGoal();
renderPlan();
document.getElementById('week-nav-ctrl').style.display='flex';
registerPwa();
</script>
